      sel.onchange = () => { filters[key] = sel.value; render(); };
      ftd.appendChild(sel);
    } else if (ftype === 'text') {
      const inp = document.createElement('input');
      inp.placeholder = 'filter...';
      inp.oninput = () => { filters[key] = inp.value.toLowerCase(); render(); };
      ftd.appendChild(inp);
    }
    flt.appendChild(ftd);
  });
  render();
}

function toggleSort(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  render();
}

function pillHtml(val, type) {
  if (!val) return '';
  const cls = 'pill pill-' + val;
  return '<span class="' + cls + '">' + val + '</span>';
}

function sourceHtml(url) {
  if (!url) return '';
  try {
    const domain = new URL(url).hostname.replace('www.','');
    return '<a href="'+url+'" target="_blank" rel="noopener">'+domain+'</a>';
  } catch { return url; }
}

function render() {
  let rows = ROWS.filter(r => {
    for (const [key, , ftype] of COLS) {
      const f = filters[key];
      if (!f) continue;
      const v = (r[key]||'').toString();
      if (ftype === 'select' && v !== f) return false;
      if (ftype === 'text' && !v.toLowerCase().includes(f)) return false;
    }
    return true;
  });

  rows.sort((a, b) => {
    let va = (a[sortCol]||'').toString().toLowerCase();
    let vb = (b[sortCol]||'').toString().toLowerCase();
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  // Update arrows
  COLS.forEach(([key]) => {
    const el = document.getElementById('arrow-'+key);
    if (key === sortCol) {
      el.className = 'arrow active';
      el.textContent = sortAsc ? '\u25B2' : '\u25BC';
    } else {
      el.className = 'arrow';
      el.textContent = '';
    }
  });

  document.getElementById('rowcount').textContent = rows.length;

  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="'+COLS.length+'" class="empty">No matching theses</td></tr>';
    return;
  }

  const html = rows.map(r => {
    const cells = COLS.map(([key]) => {
      const v = r[key] || '';
      if (key === 'ticker') return '<td class="cell-ticker">' + v + '</td>';
      if (key === 'claim') return "<td class=\"cell-claim\"><span onclick=\"this.classList.toggle('expanded')\">" + v + "</span></td>";
      if (key === 'catalyst') return "<td class=\"cell-catalyst\"><span onclick=\"this.classList.toggle('expanded')\">" + v + "</span></td>";
      if (key === 'position_side') return '<td>' + pillHtml(v, 'direction') + '</td>';
      if (key === 'confidence') return '<td>' + pillHtml(v, 'confidence') + '</td>';
      if (key === 'horizon') return '<td>' + pillHtml(v, 'horizon') + '</td>';
      if (key === 'source_url') return '<td class="cell-source">' + sourceHtml(v) + '</td>';
      return '<td>' + v + '</td>';
    }).join('');
    return '<tr>' + cells + '</tr>';
  }).join('');
  tbody.innerHTML = html;
}

init();
</script>
</body>
</html>
